<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">
  <!-- Tier 3 — GOLD full badge with wordmark -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#160f00"/>
      <stop offset="100%" stop-color="#060400"/>
    </linearGradient>
    <radialGradient id="atm" cx="280" cy="256" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#d97706" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fef3c0"/>
      <stop offset="35%"  stop-color="#fbbf24"/>
      <stop offset="70%"  stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="gd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#78350f"/>
      <stop offset="100%" stop-color="#160700"/>
    </linearGradient>
    <radialGradient id="sh" cx="0.38" cy="0.25" r="0.65">
      <stop offset="0%"   stop-color="#fff8dc" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#fff8dc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fef3c0"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="512" fill="url(#bg)"/>
  <rect width="1024" height="512" fill="url(#atm)"/>

  <g transform="translate(75, 54) scale(0.79)">
    <rect x="64"  y="64"  width="288" height="288" rx="56" fill="url(#gd)" stroke="url(#gl)" stroke-width="16"/>
    <rect x="160" y="160" width="288" height="288" rx="56" fill="url(#gl)"/>
    <rect x="160" y="160" width="288" height="288" rx="56" fill="url(#sh)"/>
  </g>

  <text x="560" y="228"
        font-family="Inter, -apple-system, ui-sans-serif, sans-serif"
        font-weight="800" font-size="80" letter-spacing="-2"
        fill="#f5e8c0">OVERFRAME</text>
  <text x="562" y="308"
        font-family="Inter, -apple-system, ui-sans-serif, sans-serif"
        font-weight="700" font-size="58" letter-spacing="5"
        fill="url(#tg)">GOLD</text>
  <text x="563" y="356"
        font-family="Inter, -apple-system, ui-sans-serif, sans-serif"
        font-weight="500" font-size="20" letter-spacing="3"
        fill="#b08830">SUPPORTER · TIER III</text>
</svg>
