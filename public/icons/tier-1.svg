<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">
  <!-- Tier 1 — BRONZE full badge with wordmark (dark bg, for Ko-fi cover) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#130a02"/>
      <stop offset="100%" stop-color="#060301"/>
    </linearGradient>
    <radialGradient id="atm" cx="280" cy="256" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#cd7f32" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#cd7f32" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f4c57a"/>
      <stop offset="40%"  stop-color="#cd7f32"/>
      <stop offset="100%" stop-color="#6b3a12"/>
    </linearGradient>
    <linearGradient id="bd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4a2808"/>
      <stop offset="100%" stop-color="#130600"/>
    </linearGradient>
    <radialGradient id="sh" cx="0.38" cy="0.3" r="0.65">
      <stop offset="0%"   stop-color="#fff3dc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fff3dc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f4c57a"/>
      <stop offset="100%" stop-color="#9a5e22"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="512" fill="url(#bg)"/>
  <rect width="1024" height="512" fill="url(#atm)"/>

  <!-- Logo: mark centred at x=280, y=256; source 512×512; scale=0.8 -->
  <g transform="translate(75, 54) scale(0.79)">
    <rect x="64"  y="64"  width="288" height="288" rx="56" fill="url(#bd)" stroke="url(#bl)" stroke-width="16"/>
    <rect x="160" y="160" width="288" height="288" rx="56" fill="url(#bl)"/>
    <rect x="160" y="160" width="288" height="288" rx="56" fill="url(#sh)"/>
  </g>

  <!-- Wordmark + labels -->
  <text x="560" y="228"
        font-family="Inter, -apple-system, ui-sans-serif, sans-serif"
        font-weight="800" font-size="80" letter-spacing="-2"
        fill="#f5ead8">OVERFRAME</text>
  <text x="562" y="308"
        font-family="Inter, -apple-system, ui-sans-serif, sans-serif"
        font-weight="700" font-size="58" letter-spacing="5"
        fill="url(#tg)">BRONZE</text>
  <text x="563" y="356"
        font-family="Inter, -apple-system, ui-sans-serif, sans-serif"
        font-weight="500" font-size="20" letter-spacing="3"
        fill="#886644">SUPPORTER · TIER I</text>
</svg>
