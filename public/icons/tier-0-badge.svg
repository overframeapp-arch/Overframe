<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">
  <!-- VIOLET — transparent bg, icon mark only, 2:1.
       This is the Overframe brand default tier badge. -->
  <defs>
    <linearGradient id="vl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="vd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#09000f"/>
    </linearGradient>
    <radialGradient id="sh" cx="0.38" cy="0.3" r="0.65">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="512" cy="256" rx="280" ry="240" fill="url(#halo)"/>
  <g transform="translate(302, 46) scale(0.82)">
    <rect x="64"  y="64"  width="288" height="288" rx="56"
          fill="url(#vd)" stroke="url(#vl)" stroke-width="16"/>
    <rect x="160" y="160" width="288" height="288" rx="56" fill="url(#vl)"/>
    <rect x="160" y="160" width="288" height="288" rx="56" fill="url(#sh)"/>
  </g>
</svg>
