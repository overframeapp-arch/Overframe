<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">
  <!-- SILVER — transparent bg, icon mark only, 2:1. -->
  <defs>
    <linearGradient id="sl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f8f8fc"/>
      <stop offset="40%"  stop-color="#c0c0cc"/>
      <stop offset="100%" stop-color="#606070"/>
    </linearGradient>
    <linearGradient id="sd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#28283c"/>
      <stop offset="100%" stop-color="#0a0a14"/>
