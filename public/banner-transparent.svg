<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <!-- Transparent banner — no background fill, for compositing -->
  <defs>
    <linearGradient id="vl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="vd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#09000f"/>
    </linearGradient>
    <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e0d9ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <g transform="translate(80, 60) scale(0.547)">
    <rect x="64"  y="64"  width="288" height="288" rx="56"
          fill="url(#vd)" stroke="url(#vl)" stroke-width="14"/>
    <rect x="160" y="160" width="288" height="288" rx="56" fill="url(#vl)"/>
  </g>

  <text x="440" y="218"
        font-family="Inter, -apple-system, ui-sans-serif, system-ui, sans-serif"
        font-weight="800" font-size="100" letter-spacing="-3"
        fill="url(#wg)">OVERFRAME</text>

  <text x="444" y="268"
        font-family="Inter, -apple-system, ui-sans-serif, system-ui, sans-serif"
        font-weight="500" font-size="22" letter-spacing="3"
        fill="#a78bfa">THE OVERLAY BROWSER FOR PC GAMERS</text>
</svg>
