name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    name: Build & Publish
    runs-on: windows-latest # Squirrel + native modules require Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # electron-forge make: runs electron-vite build internally, then
      # packages + creates the Squirrel installer and portable ZIP.
      # To enable code signing, configure forge.config.ts and add secrets
      # WINDOWS_CERT_FILE / WINDOWS_CERT_PASSWORD to the repo, then add an
      # env: block referencing them here.
      - name: Make
        run: pnpm make

      # Upload all Squirrel artefacts + ZIP to the GitHub Release.
      #
      # update-electron-app / update.electronjs.org reads the GitHub Release
      # for the tag that matches the running app version and serves:
      #   - RELEASES        → update manifest
      #   - *.nupkg         → delta / full update package
      #   - Overframe-Setup.exe → full installer fallback
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Overframe ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/make/squirrel.windows/x64/Overframe-Setup.exe
            dist/make/squirrel.windows/x64/RELEASES
            dist/make/squirrel.windows/x64/*.nupkg
            dist/make/zip/win32/x64/*.zip

      - name: Discord release notification
        if: success()
        shell: pwsh
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if (-not $env:DISCORD_WEBHOOK) { Write-Host "No webhook set — skipping"; exit 0 }
          $v  = "${{ github.ref_name }}"
          $ru = "https://github.com/overframeApp-arch/Overframe/releases/tag/$v"
          $du = "https://github.com/overframeApp-arch/Overframe/releases/download/$v/Overframe-Setup.exe"
          $j  = "{`"username`":`"Overframe`",`"embeds`":[{`"title`":`"Overframe $v is out!`",`"description`":`"A new version is available. Download it for free.`",`"color`":8141549,`"url`":`"$ru`",`"fields`":[{`"name`":`"Installer`",`"value`":`"[Overframe-Setup.exe]($du)`",`"inline`":true},{`"name`":`"Release notes`",`"value`":`"[View on GitHub]($ru)`",`"inline`":true}],`"footer`":{`"text`":`"Windows - Free - Open source`"}}]}"
          [System.IO.File]::WriteAllText("$env:TEMP\discord.json", $j)
          $code = curl.exe -s -w "%{http_code}" -X POST -H "Content-Type: application/json" --data-binary "@$env:TEMP\discord.json" $env:DISCORD_WEBHOOK
          Write-Host "Discord response: $code"
