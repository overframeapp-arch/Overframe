name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    name: Build & Publish
    runs-on: windows-latest # Squirrel + native modules require Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # electron-forge make: runs electron-vite build internally, then
      # packages + creates the Squirrel installer and portable ZIP.
      # To enable code signing, configure forge.config.ts and add secrets
      # WINDOWS_CERT_FILE / WINDOWS_CERT_PASSWORD to the repo, then add an
      # env: block referencing them here.
      - name: Make
        run: pnpm make

      # Upload all Squirrel artefacts + ZIP to the GitHub Release.
      #
      # update-electron-app / update.electronjs.org reads the GitHub Release
      # for the tag that matches the running app version and serves:
      #   - RELEASES        → update manifest
      #   - *.nupkg         → delta / full update package
      #   - Overframe-Setup.exe → full installer fallback
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Overframe ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/make/squirrel.windows/x64/Overframe-Setup.exe
            dist/make/squirrel.windows/x64/RELEASES
            dist/make/squirrel.windows/x64/*.nupkg
            dist/make/zip/win32/x64/*.zip

      - name: Discord release notification
        if: success()
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL secret not set — skipping notification."
            exit 0
          fi
          VERSION="${{ github.ref_name }}"
          RELEASE_URL="https://github.com/overframeApp-arch/Overframe/releases/tag/${VERSION}"
          DOWNLOAD_URL="https://github.com/overframeApp-arch/Overframe/releases/download/${VERSION}/Overframe-Setup.exe"
          export VERSION RELEASE_URL DOWNLOAD_URL DISCORD_WEBHOOK
          python3 - <<EOF
import json, os, urllib.request
version = os.environ['VERSION']
release_url = os.environ['RELEASE_URL']
download_url = os.environ['DOWNLOAD_URL']
webhook = os.environ['DISCORD_WEBHOOK']
payload = json.dumps({
  'username': 'Overframe',
  'embeds': [{
    'title': f'Overframe {version} is out!',
    'description': 'A new version is available. Download it for free.',
    'color': 8141549,
    'url': release_url,
    'fields': [
      {'name': 'Installer', 'value': f'[Overframe-Setup.exe]({download_url})', 'inline': True},
      {'name': 'Release notes', 'value': f'[View on GitHub]({release_url})', 'inline': True},
    ],
    'footer': {'text': 'Windows - Free - Open source'},
  }]
}).encode()
req = urllib.request.Request(webhook, data=payload, headers={'Content-Type': 'application/json'})
with urllib.request.urlopen(req) as r:
  print(f'Discord response: {r.status}')
EOF
