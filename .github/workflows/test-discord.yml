name: Test Discord notification

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to use in the message (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL secret not set"
            exit 1
          fi
          VERSION="${{ github.event.inputs.version }}"
          RELEASE_URL="https://github.com/overframeApp-arch/Overframe/releases/tag/${VERSION}"
          DOWNLOAD_URL="https://github.com/overframeApp-arch/Overframe/releases/download/${VERSION}/Overframe-Setup.exe"
          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg release_url "$RELEASE_URL" \
            --arg download_url "$DOWNLOAD_URL" \
            '{
              username: "Overframe",
              embeds: [{
                title: ("Overframe " + $version + " is out!"),
                description: "A new version is available. Download it for free.",
                color: 8141549,
                url: $release_url,
                fields: [
                  { name: "Installer", value: ("[Overframe-Setup.exe](" + $download_url + ")"), inline: true },
                  { name: "Release notes", value: ("[View on GitHub](" + $release_url + ")"), inline: true }
                ],
                footer: { text: "Windows - Free - Open source" }
              }]
            }')
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK")
          echo "Discord response: $HTTP"
          [ "$HTTP" = "204" ] && echo "Success" || exit 1
