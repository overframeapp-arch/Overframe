name: Test Discord notification

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to use in the message (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL secret not set"
            exit 1
          fi
          VERSION="${{ github.event.inputs.version }}"
          RELEASE_URL="https://github.com/overframeApp-arch/Overframe/releases/tag/${VERSION}"
          DOWNLOAD_URL="https://github.com/overframeApp-arch/Overframe/releases/download/${VERSION}/Overframe-Setup.exe"
          export VERSION RELEASE_URL DOWNLOAD_URL DISCORD_WEBHOOK
          python3 - <<EOF
import json, os, urllib.request
version = os.environ['VERSION']
release_url = os.environ['RELEASE_URL']
download_url = os.environ['DOWNLOAD_URL']
webhook = os.environ['DISCORD_WEBHOOK']
payload = json.dumps({
  'username': 'Overframe',
  'embeds': [{
    'title': f'Overframe {version} is out!',
    'description': 'A new version is available. Download it for free.',
    'color': 8141549,
    'url': release_url,
    'fields': [
      {'name': 'Installer', 'value': f'[Overframe-Setup.exe]({download_url})', 'inline': True},
      {'name': 'Release notes', 'value': f'[View on GitHub]({release_url})', 'inline': True},
    ],
    'footer': {'text': 'Windows - Free - Open source'},
  }]
}).encode()
req = urllib.request.Request(webhook, data=payload, headers={'Content-Type': 'application/json'})
with urllib.request.urlopen(req) as r:
  print(f'Discord response: {r.status}')
EOF
