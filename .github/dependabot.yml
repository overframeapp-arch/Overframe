version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      # All non-breaking patch/minor updates in one PR.
      npm-all:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # Tailwind v4 is a breaking rewrite (no @tailwind directives, CSS-based
      # config). Migrate intentionally — do not auto-bump.
      - dependency-name: "tailwindcss"
        versions: [">=4.0.0"]
      # electron-store v9+ and ps-list v8+ are ESM-only. The Electron main
      # process builds as CJS (externalizeDepsPlugin) — require() of ESM fails
      # at runtime. Migrate to ESM main process intentionally before bumping.
      - dependency-name: "electron-store"
        versions: [">=9.0.0"]
      - dependency-name: "ps-list"
        versions: [">=8.0.0"]
      # TypeScript 6 — intentional migration needed (strict mode changes, etc.)
      - dependency-name: "typescript"
        versions: [">=6.0.0"]
      # lucide-react v1 — major API breaking changes from 0.x
      - dependency-name: "lucide-react"
        versions: [">=1.0.0"]
      # React 18→19 — intentional migration (async transitions, use(), etc.)
      - dependency-name: "react"
        versions: [">=19.0.0"]
      - dependency-name: "react-dom"
        versions: [">=19.0.0"]
      - dependency-name: "@types/react"
        versions: [">=19.0.0"]

  - package-ecosystem: "npm"
    directory: "/landing"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      landing-all:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "tailwindcss"
        versions: [">=4.0.0"]
      # ESLint 10 — intentional migration needed
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
      # React 18→19 — intentional migration
      - dependency-name: "react-dom"
        versions: [">=19.0.0"]
      - dependency-name: "@types/react-dom"
        versions: [">=19.0.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      actions-all:
        patterns: ["*"]
