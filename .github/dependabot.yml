version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      # All non-breaking patch/minor updates in one PR.
      npm-all:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # Tailwind v4 is a breaking rewrite (no @tailwind directives, CSS-based
      # config). Migrate intentionally — do not auto-bump.
      - dependency-name: "tailwindcss"
        versions: [">=4.0.0"]
      # electron-store v9+ and ps-list v8+ are ESM-only. The Electron main
      # process builds as CJS (externalizeDepsPlugin) — require() of ESM fails
      # at runtime. Migrate to ESM main process intentionally before bumping.
      - dependency-name: "electron-store"
        versions: [">=9.0.0"]
      - dependency-name: "ps-list"
        versions: [">=8.0.0"]

  - package-ecosystem: "npm"
    directory: "/landing"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      landing-all:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "tailwindcss"
        versions: [">=4.0.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      actions-all:
        patterns: ["*"]
